apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-fastapi
  template:
    metadata:
      labels:
        app: rag-fastapi
    spec:
      containers:
      - name: fastapi
        image: kubectl describe pod rag-fastapi-54589978c-wgqqj
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
spec:
  type: NodePort
  selector:
    app: rag-fastapi
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007