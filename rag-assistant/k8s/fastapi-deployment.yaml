apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-fastapi
  labels:
    app: rag-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-fastapi
  template:
    metadata:
      labels:
        app: rag-fastapi
    spec:
      containers:
      - name: fastapi
        image: YOUR_DOCKER_IMAGE   # 🔴 replace this

        ports:
          - containerPort: 8000

        env:
          - name: QWEN_API_URL
            value: "http://qwen-service:8000/v1/chat/completions"

        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"