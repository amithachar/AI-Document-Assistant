apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-fastapi
  template:
    metadata:
      labels:
        app: rag-fastapi
    spec:
      containers:
        - name: fastapi
          image: your-dockerhub/rag-assistant:latest
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: CHROMA_PATH
              value: "/data/chroma"
          volumeMounts:
            - name: chroma-storage
              mountPath: /data
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc