apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
      - name: chromadb
        image: chromadb/chroma
        ports:
        - containerPort: 8000
        volumeMounts:
        - mountPath: /data
          name: chroma-storage
      volumes:
      - name: chroma-storage
        persistentVolumeClaim:
          claimName: chroma-pvc