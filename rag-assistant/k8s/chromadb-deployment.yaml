apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-fastapi
  template:
    metadata:
      labels:
        app: rag-fastapi
    spec:
      containers:
      - name: fastapi
        image: amithachar/rag-assistant:latest
        ports:
        - containerPort: 8000
        env:
        - name: OLLAMA_URL
          value: "http://ollama-service:11434/api/generate"

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"